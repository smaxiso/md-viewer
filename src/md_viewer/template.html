<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - {{ project_name }}</title>
    {{ pygments_style_block }}
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #f0f2f5;
            --text-primary: #24292e;
            --text-muted: #586069;
            --border-color: #e1e4e8;
            --accent-color: #0366d6;
            --accent-hover: #0550ae;
            --code-bg: #f6f8fa;
            --hover-bg: #e8ebef;
            --active-bg: rgba(3, 102, 214, 0.08);
            --active-border: #0366d6;
            --folder-color: #54aeff;
            --file-color: #8b949e;
            --md-color: #57ab5a;
            --py-color: #3572A5;
            --json-color: #f1e05a;
            --yaml-color: #cb171e;
            --sh-color: #89e051;
            --depth-0: transparent;
            --depth-1: rgba(3, 102, 214, 0.03);
            --depth-2: rgba(3, 102, 214, 0.06);
            --depth-3: rgba(3, 102, 214, 0.09);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0d1117;
                --bg-secondary: #161b22;
                --bg-tertiary: #1c2128;
                --text-primary: #c9d1d9;
                --text-muted: #8b949e;
                --border-color: #30363d;
                --accent-color: #58a6ff;
                --accent-hover: #79c0ff;
                --code-bg: #161b22;
                --hover-bg: #21262d;
                --active-bg: rgba(88, 166, 255, 0.1);
                --active-border: #58a6ff;
                --folder-color: #54aeff;
                --file-color: #8b949e;
                --md-color: #7ee787;
                --py-color: #79c0ff;
                --json-color: #f1e05a;
                --yaml-color: #f78166;
                --sh-color: #89e051;
                --depth-0: transparent;
                --depth-1: rgba(88, 166, 255, 0.03);
                --depth-2: rgba(88, 166, 255, 0.06);
                --depth-3: rgba(88, 166, 255, 0.09);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-primary);
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .app-header {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            gap: 12px;
        }
        .header-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-search {
            width: 260px;
            position: relative;
        }
        .header-search input {
            width: 100%;
            padding: 6px 10px 6px 30px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            font-size: 13px;
        }
        .header-search input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.2);
        }
        .search-icon {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--text-muted);
        }
        .header-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.15s;
        }
        .header-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }
        .header-btn svg { fill: currentColor; }

        /* Main Layout */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }
        .nav-container {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            font-size: 13px;
        }

        /* Tree Styles */
        .nav-tree {
            list-style: none;
            padding-left: 0;
        }
        .nav-tree .nav-tree { padding-left: 12px; }
        .nav-tree li { margin: 0; white-space: nowrap; }

        /* File & Folder Item Links */
        .tree-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 12px 3px 8px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 4px;
            margin: 1px 4px;
            cursor: pointer;
            transition: background 0.1s;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            border-left: 2px solid transparent;
        }
        .tree-item:hover { background: var(--hover-bg); }
        .tree-item .icon { flex-shrink: 0; width: 16px; height: 16px; }
        .tree-item .label { overflow: hidden; text-overflow: ellipsis; }

        /* Active states */
        .tree-item.active {
            background: var(--active-bg);
            border-left-color: var(--active-border);
            color: var(--accent-color);
            font-weight: 500;
        }
        li.folder.has-active > .tree-item {
            color: var(--accent-color);
            font-weight: 500;
        }

        /* Folder toggle */
        .tree-item .toggle-icon {
            flex-shrink: 0;
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
            transition: transform 0.15s;
        }
        li.folder.expanded > .tree-item .toggle-icon { transform: rotate(90deg); }

        /* Folder content */
        .folder-content { display: none; }
        li.folder.expanded > .folder-content { display: block; }

        /* Depth-based subtle backgrounds */
        .nav-tree[data-depth="1"] { background: var(--depth-1); }
        .nav-tree[data-depth="2"] { background: var(--depth-2); }
        .nav-tree[data-depth="3"] { background: var(--depth-3); }

        /* Content Area */
        .content-wrapper { flex: 1; overflow-y: auto; position: relative; }
        .content {
            padding: 30px 40px;
            padding-top: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Breadcrumb */
        .breadcrumb-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 40px 8px 40px;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow-x: auto;
            gap: 2px;
        }
        .breadcrumb svg { fill: var(--text-muted); flex-shrink: 0; }
        .breadcrumb-item {
            color: var(--text-muted);
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 12px;
            padding: 1px 5px;
            border-radius: 3px;
            text-decoration: none;
            transition: all 0.15s;
        }
        .breadcrumb-item:hover {
            background: var(--hover-bg);
            color: var(--accent-color);
        }
        .breadcrumb-item:last-child { color: var(--text-primary); font-weight: 500; }

        /* Markdown Styles */
        .content h1 { font-size: 28px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        .content h2 { font-size: 22px; margin-top: 28px; margin-bottom: 12px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        .content h3 { font-size: 18px; margin-top: 22px; margin-bottom: 8px; }
        .content code { background: var(--code-bg); padding: 2px 6px; border-radius: 3px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 85%; }
        .content pre { background: var(--code-bg); padding: 16px; border-radius: 6px; overflow-x: auto; margin: 16px 0; }
        .content pre code { background: none; padding: 0; }
        .content table { border-collapse: collapse; width: 100%; margin: 16px 0; }
        .content table th, .content table td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: left; }
        .content table th { background: var(--bg-secondary); font-weight: 600; }
        .content img { max-width: 100%; height: auto; }
        .content a { color: var(--accent-color); }
        .content a:hover { text-decoration: underline; }
        .content blockquote { border-left: 3px solid var(--accent-color); padding: 8px 16px; margin: 16px 0; color: var(--text-muted); background: var(--bg-secondary); border-radius: 0 4px 4px 0; }
        .content ul, .content ol { padding-left: 24px; margin: 8px 0; }
        .content li { margin: 4px 0; }
        .content p { margin: 8px 0; line-height: 1.6; }
        .content hr { border: none; border-top: 1px solid var(--border-color); margin: 24px 0; }

        /* Directory Grid */
        .dir-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .dir-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.15s;
            font-size: 14px;
        }
        .dir-item:hover {
            background: var(--bg-primary);
            border-color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }
        .dir-item svg { margin-right: 10px; flex-shrink: 0; fill: var(--text-muted); }
        .dir-item:hover svg { fill: var(--accent-color); }

        /* Live reload indicator */
        .live-reload-indicator {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .live-reload-indicator.visible { opacity: 1; }
        .live-reload-indicator.reloading { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .hidden { display: none !important; }
        .search-highlight { background-color: rgba(255, 235, 59, 0.4); border-radius: 2px; }

        /* Print styles */
        @media print {
            .app-header, .sidebar, .breadcrumb-container, .live-reload-indicator { display: none !important; }
            .app-body { display: block !important; }
            .content-wrapper { overflow: visible !important; }
            .content { max-width: 100% !important; padding: 0 !important; }
            body { height: auto !important; overflow: visible !important; }
        }
    </style>
</head>
<body>

    <div class="app-body">
        <aside class="sidebar">
            <div class="sidebar-header">Explorer</div>
            <div class="nav-container" id="nav-container">
                {{ nav_items }}
            </div>
        </aside>

        <main class="content-wrapper">
            <div class="breadcrumb-container">
                {{ breadcrumb }}
            </div>
            <div class="content">
                {{ content }}
            </div>
        </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/plantuml-encoder@1.4.0/dist/plantuml-encoder.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script>
        // ===== Tree Interaction & State Management =====
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('nav-container');
            const searchInput = document.getElementById('nav-search');
            if (!container) return;

            const expandedState = JSON.parse(localStorage.getItem('mdview_tree_state') || '{}');

            function toggleFolder(folderLi) {
                const isExpanded = folderLi.classList.toggle('expanded');
                const path = folderLi.getAttribute('data-path');
                if (path) {
                    expandedState[path] = isExpanded;
                    localStorage.setItem('mdview_tree_state', JSON.stringify(expandedState));
                }
            }

            // Click on folder row toggles expand
            container.querySelectorAll('li.folder > .tree-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    // If clicked on the label text area (not a direct link navigation), toggle
                    e.preventDefault();
                    e.stopPropagation();
                    toggleFolder(item.closest('li.folder'));
                });
            });

            // Restore saved expansion state
            container.querySelectorAll('li.folder').forEach(folder => {
                const path = folder.getAttribute('data-path');
                if (expandedState[path]) {
                    folder.classList.add('expanded');
                }
            });

            // Auto-expand & highlight parents of active item
            const activeItem = container.querySelector('.tree-item.active');
            if (activeItem) {
                let parent = activeItem.parentElement;
                while (parent && parent.id !== 'nav-container') {
                    if (parent.tagName === 'LI' && parent.classList.contains('folder')) {
                        parent.classList.add('expanded');
                        parent.classList.add('has-active');
                        const path = parent.getAttribute('data-path');
                        if (path) { expandedState[path] = true; }
                    }
                    parent = parent.parentElement;
                }
                localStorage.setItem('mdview_tree_state', JSON.stringify(expandedState));
                setTimeout(() => {
                    activeItem.scrollIntoView({ block: 'center', behavior: 'smooth' });
                }, 100);
            }

            // Search
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const allItems = container.querySelectorAll('li');

                    if (!term) {
                        allItems.forEach(li => {
                            li.classList.remove('hidden');
                            const a = li.querySelector('.tree-item .label');
                            if (a) a.innerHTML = a.textContent;
                        });
                        container.querySelectorAll('li.folder').forEach(folder => {
                            const path = folder.getAttribute('data-path');
                            folder.classList.toggle('expanded', !!expandedState[path]);
                        });
                        return;
                    }

                    allItems.forEach(li => li.classList.add('hidden'));

                    allItems.forEach(li => {
                        const label = li.querySelector('.tree-item .label');
                        if (!label) return;
                        const text = label.textContent;
                        const textLower = text.toLowerCase();

                        if (textLower.includes(term)) {
                            const idx = textLower.indexOf(term);
                            const original = text.substring(idx, idx + term.length);
                            label.innerHTML = text.substring(0, idx) +
                                `<span class="search-highlight">${original}</span>` +
                                text.substring(idx + term.length);

                            li.classList.remove('hidden');

                            let parent = li.parentElement;
                            while (parent && parent.id !== 'nav-container') {
                                if (parent.tagName === 'LI') {
                                    parent.classList.remove('hidden');
                                    if (parent.classList.contains('folder')) {
                                        parent.classList.add('expanded');
                                    }
                                }
                                parent = parent.parentElement;
                            }
                        } else {
                            label.innerHTML = text;
                        }
                    });
                });
            }
        });

        // ===== PDF Export =====
        document.getElementById('btn-pdf')?.addEventListener('click', () => {
            window.print();
        });

        // ===== Diagram Rendering =====
        function renderPlantUML() {
            document.querySelectorAll('pre code').forEach(block => {
                const codeText = block.textContent.trim();
                const hasPlantUMLClass = block.className &&
                    (block.className.includes('plantuml') || block.className.includes('puml'));
                const startsWithStartUML = codeText.startsWith('@startuml');

                if (hasPlantUMLClass || startsWithStartUML) {
                    const container = document.createElement('div');
                    container.className = 'plantuml-container';
                    container.innerHTML = '<div style="color:var(--text-muted);padding:12px;">Loading diagram...</div>';

                    const pre = block.parentElement;
                    pre.parentElement.replaceChild(container, pre);

                    try {
                        const encoded = plantumlEncoder.encode(codeText);
                        const img = document.createElement('img');
                        img.src = 'https://www.plantuml.com/plantuml/svg/' + encoded;
                        img.style.maxWidth = '100%';
                        img.onload = () => { container.innerHTML = ''; container.appendChild(img); };
                        img.onerror = () => { container.innerHTML = '<div style="color:red;">Failed to load diagram</div>'; };
                    } catch (e) {
                        container.innerHTML = '<div style="color:red;">Error generating diagram</div>';
                    }
                }
            });
        }

        function renderMermaid() {
            const mermaidBlocks = [];
            document.querySelectorAll('pre code').forEach(block => {
                if (block.className && block.className.includes('mermaid')) {
                    const container = document.createElement('div');
                    container.className = 'mermaid';
                    container.textContent = block.textContent.trim();
                    container.style.textAlign = 'center';
                    container.style.margin = '20px 0';
                    const pre = block.parentElement;
                    pre.parentElement.replaceChild(container, pre);
                    mermaidBlocks.push(container);
                }
            });

            if (mermaidBlocks.length > 0 && typeof mermaid !== 'undefined') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                mermaid.initialize({
                    startOnLoad: false,
                    theme: isDark ? 'dark' : 'default',
                    securityLevel: 'loose'
                });
                mermaid.run({ nodes: mermaidBlocks });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderPlantUML();
            renderMermaid();
        });

        // ===== Live Reload =====
        (function() {
            const currentFile = window.location.pathname.substring(1) || 'README.md';
            let lastModified = null;
            const indicator = document.createElement('div');
            indicator.className = 'live-reload-indicator';
            indicator.textContent = '🔄 Checking...';
            document.querySelector('.content-wrapper')?.appendChild(indicator);

            function checkForUpdates() {
                fetch('/_check_update?file=' + encodeURIComponent(currentFile))
                    .then(r => r.json())
                    .then(data => {
                        if (data.error) return;
                        if (lastModified === null) { lastModified = data.modified; return; }
                        if (data.modified !== lastModified) {
                            indicator.className = 'live-reload-indicator visible reloading';
                            indicator.textContent = '🔄 Reloading...';
                            setTimeout(() => { window.location.reload(); }, 300);
                        }
                    })
                    .catch(() => {});
            }
            setInterval(checkForUpdates, 2000);
        })();
    </script>
</body>
</html>
